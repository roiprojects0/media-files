<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liquid icons • 3d fluid motion</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function() {
            // --- setup ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 0, 12);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a1a);
            document.body.appendChild(renderer.domElement);

            // --- mouse for interaction ---
            const mouse = new THREE.Vector2(0.5, 0.5);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX / window.innerWidth;
                mouse.y = 1.0 - (e.clientY / window.innerHeight);
            });
            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length) {
                    mouse.x = e.touches[0].clientX / window.innerWidth;
                    mouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
                }
            }, { passive: false });
            window.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches.length) {
                    mouse.x = e.touches[0].clientX / window.innerWidth;
                    mouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
                }
            });

            // --- background: trippy liquid plane ---
            const planeGeo = new THREE.PlaneGeometry(70, 70);
            const planeMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    mouse: { value: new THREE.Vector2(0.5, 0.5) },
                    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    precision highp float;
                    varying vec2 vUv;
                    uniform float time;
                    uniform vec2 mouse;
                    uniform vec2 resolution;

                    // --- noise functions ---
                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                    }
                    float noise(vec2 p) {
                        vec2 i = floor(p);
                        vec2 f = fract(p);
                        vec2 u = f*f*(3.0-2.0*f);
                        return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                                   mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                    }

                    void main() {
                        // psychedelic flow: multiple layers with strong color shifts
                        vec2 uv = vUv * 4.0 - 2.0;  // zoom out a bit
                        
                        // mouse influence – creates a swirling vortex
                        vec2 m = (mouse - 0.5) * 2.0;
                        uv += vec2(sin(uv.y * 3.0 + time * 0.8) * 0.2 + m.x * 0.3,
                                   cos(uv.x * 3.0 + time * 0.6) * 0.2 + m.y * 0.3);
                        
                        float t1 = time * 0.5;
                        float t2 = time * 0.8;
                        float t3 = time * 1.3;
                        
                        // three layers of distortion
                        float c1 = sin(uv.x * 5.0 + t1) * cos(uv.y * 5.0 - t2);
                        float c2 = sin(uv.x * 8.0 + t2 * 1.7) * sin(uv.y * 7.0 - t3);
                        float c3 = noise(vec2(uv.x * 6.0 + t1 * 1.2, uv.y * 6.0 - t2 * 0.9));
                        
                        // combine with wild color mapping
                        float r = sin(c1 * 3.0 + c2 * 2.0 + c3 * 5.0 + time) * 0.7 + 0.5;
                        float g = cos(c2 * 4.0 - c1 * 2.0 + time * 1.2) * 0.8 + 0.5;
                        float b = sin((c1 + c2 + c3) * 6.0 + time * 2.0) * 0.9 + 0.5;
                        
                        // extra psychedelic boost from mouse
                        r += m.x * 0.25;
                        g += m.y * 0.25;
                        b += (m.x + m.y) * 0.15;
                        
                        // clamp and enhance saturation
                        vec3 color = vec3(r, g, b);
                        color = mix(color, color.rbg, 0.3); // swap channels for trippiness
                        
                        // vignette & edge darkening
                        float dist = length(vUv - 0.5);
                        color *= 1.0 - dist * 0.5;
                        
                        // subtle grain
                        float grain = hash(uv + floor(time * 10.0)) * 0.05;
                        color += grain;
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });

            const backgroundPlane = new THREE.Mesh(planeGeo, planeMat);
            backgroundPlane.position.set(0, 0, -30);
            scene.add(backgroundPlane);

            // --- generate icon textures (canvas based) ---
            function createIconTexture(shape, hue) {
                const size = 64;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);

                const cx = size/2, cy = size/2;
                const maxRad = size * 0.4;

                // gradient fill with metallic look
                const grad = ctx.createRadialGradient(cx-5, cy-5, 5, cx, cy, maxRad*1.3);
                grad.addColorStop(0, `hsl(${hue}, 95%, 80%)`);
                grad.addColorStop(0.5, `hsl(${hue}, 95%, 60%)`);
                grad.addColorStop(1, `hsl(${hue}, 95%, 40%)`);
                
                ctx.fillStyle = grad;
                ctx.strokeStyle = `hsl(${hue}, 90%, 90%)`;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                ctx.beginPath();
                switch(shape) {
                    case 'star':
                        let points = 5;
                        let outerR = maxRad;
                        let innerR = maxRad * 0.45;
                        for (let i = 0; i < points * 2; i++) {
                            let radius = i % 2 === 0 ? outerR : innerR;
                            let angle = (Math.PI / points) * i - Math.PI / 2;
                            let x = cx + radius * Math.cos(angle);
                            let y = cy + radius * Math.sin(angle);
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        break;
                    case 'heart':
                        ctx.moveTo(cx, cy - maxRad*0.5);
                        ctx.bezierCurveTo(cx - maxRad*0.8, cy - maxRad*0.8, cx - maxRad*0.3, cy + maxRad*0.3, cx, cy + maxRad*0.7);
                        ctx.bezierCurveTo(cx + maxRad*0.3, cy + maxRad*0.3, cx + maxRad*0.8, cy - maxRad*0.8, cx, cy - maxRad*0.5);
                        break;
                    case 'circle':
                        ctx.arc(cx, cy, maxRad, 0, Math.PI*2);
                        break;
                    case 'square':
                        ctx.rect(cx-maxRad, cy-maxRad, maxRad*2, maxRad*2);
                        break;
                    case 'triangle':
                        ctx.moveTo(cx, cy - maxRad);
                        ctx.lineTo(cx + maxRad*0.9, cy + maxRad*0.6);
                        ctx.lineTo(cx - maxRad*0.9, cy + maxRad*0.6);
                        ctx.closePath();
                        break;
                    case 'diamond':
                        ctx.moveTo(cx, cy - maxRad);
                        ctx.lineTo(cx + maxRad, cy);
                        ctx.lineTo(cx, cy + maxRad);
                        ctx.lineTo(cx - maxRad, cy);
                        ctx.closePath();
                        break;
                    case 'plus':
                        ctx.rect(cx - maxRad*0.3, cy - maxRad, maxRad*0.6, maxRad*2);
                        ctx.rect(cx - maxRad, cy - maxRad*0.3, maxRad*2, maxRad*0.6);
                        break;
                    default:
                        ctx.arc(cx, cy, maxRad, 0, Math.PI*2);
                }
                ctx.fill();
                ctx.stroke();

                // tiny sparkle
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(cx-6, cy-8, 3, 0, 2*Math.PI);
                ctx.fill();

                return new THREE.CanvasTexture(canvas);
            }

            const shapeTypes = ['star', 'heart', 'circle', 'square', 'triangle', 'diamond', 'plus'];
            const iconTextures = shapeTypes.map((shape, idx) => createIconTexture(shape, (idx * 51 + 180) % 360));

            // --- floating icons with smooth 3D motion ---
            const iconGroup = new THREE.Group();
            const iconCount = 120;
            const iconData = [];

            for (let i = 0; i < iconCount; i++) {
                const tex = iconTextures[Math.floor(Math.random() * iconTextures.length)];
                const material = new THREE.SpriteMaterial({ 
                    map: tex, 
                    blending: THREE.NormalBlending,
                    depthTest: true,
                    depthWrite: false,
                    transparent: true,
                    opacity: 0.8 + Math.random() * 0.2
                });
                
                const sprite = new THREE.Sprite(material);
                
                const baseX = (Math.random() - 0.5) * 24;
                const baseY = (Math.random() - 0.5) * 20;
                const baseZ = (Math.random() - 0.5) * 16;
                
                sprite.position.set(baseX, baseY, baseZ);
                
                const scale = 0.4 + Math.random() * 1.0;
                sprite.scale.set(scale, scale, 1);
                
                iconData.push({
                    basePos: new THREE.Vector3(baseX, baseY, baseZ),
                    speed: new THREE.Vector3(
                        0.15 + Math.random() * 0.35,
                        0.2 + Math.random() * 0.4,
                        0.1 + Math.random() * 0.3
                    ),
                    phase: new THREE.Vector3(
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2
                    ),
                    amp: new THREE.Vector3(
                        0.8 + Math.random() * 1.5,
                        0.9 + Math.random() * 1.6,
                        0.6 + Math.random() * 1.2
                    ),
                    rotSpeed: (Math.random() - 0.5) * 0.02
                });
                
                iconGroup.add(sprite);
            }
            scene.add(iconGroup);

            // --- subtle ambient light (sprites don't need it, but keeps Three happy) ---
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);

            // --- animation loop ---
            let clock = new THREE.Clock();

            function animate() {
                const delta = clock.getDelta();
                const elapsedTime = performance.now() / 1000;

                // update shader
                if (backgroundPlane.material.uniforms) {
                    backgroundPlane.material.uniforms.time.value = elapsedTime * 0.9;
                    backgroundPlane.material.uniforms.mouse.value.set(mouse.x, mouse.y);
                }

                // animate icons: fluid, wave-like motion
                iconGroup.children.forEach((sprite, idx) => {
                    const data = iconData[idx];
                    if (!data) return;

                    const t = elapsedTime;
                    const dx = Math.sin(t * data.speed.x + data.phase.x) * data.amp.x;
                    const dy = Math.cos(t * data.speed.y + data.phase.y) * data.amp.y;
                    const dz = Math.sin(t * data.speed.z + data.phase.z) * data.amp.z;
                    
                    sprite.position.x = data.basePos.x + dx;
                    sprite.position.y = data.basePos.y + dy;
                    sprite.position.z = data.basePos.z + dz;

                    // subtle rotation
                    sprite.material.rotation += data.rotSpeed * delta * 30;
                });

                // slight camera drift for extra immersion
                camera.position.x = Math.sin(elapsedTime * 0.1) * 1.2;
                camera.position.y = Math.cos(elapsedTime * 0.15) * 0.8;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }

            animate();

            // --- resize handler ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (backgroundPlane.material.uniforms.resolution) {
                    backgroundPlane.material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
                }
            });

            // initial call
            window.dispatchEvent(new Event('resize'));
        })();
    </script>
</body>
</html>
