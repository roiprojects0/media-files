<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liquid icons • 3d fluid motion</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: none; /* no text anywhere */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* prevent scroll/pinch on mobile */
        }
    </style>
</head>
<body>
    <!-- no text – only pure graphics + 3d liquid + floating icons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function() {
            // --- setup scene, camera, renderer ---
            const scene = new THREE.Scene();
            
            // perspective camera – look at origin
            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 0, 12);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // crisp but not too heavy
            renderer.setClearColor(0x0a0a1a); // deep base for background (shader will overdraw anyway)
            document.body.appendChild(renderer.domElement);

            // --- mouse interaction uniform (for liquid background) ---
            const mouse = new THREE.Vector2(0.5, 0.5); // default center
            
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX / window.innerWidth;
                mouse.y = 1.0 - (e.clientY / window.innerHeight); // flip Y so 0 = bottom
            });
            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length) {
                    mouse.x = e.touches[0].clientX / window.innerWidth;
                    mouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
                }
            }, { passive: false });
            window.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches.length) {
                    mouse.x = e.touches[0].clientX / window.innerWidth;
                    mouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
                }
            });

            // --- background: giant liquid plane with interactive shader ---
            // large plane far behind icons – will look like infinite liquid universe
            const planeGeo = new THREE.PlaneGeometry(70, 70); 
            const planeMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    mouse: { value: new THREE.Vector2(0.5, 0.5) },
                    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    precision highp float;
                    varying vec2 vUv;
                    uniform float time;
                    uniform vec2 mouse;
                    uniform vec2 resolution;

                    // pseudo-random noise
                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                    }
                    
                    // smooth noise
                    float noise(vec2 p) {
                        vec2 i = floor(p);
                        vec2 f = fract(p);
                        vec2 u = f*f*(3.0-2.0*f);
                        return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                                   mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                    }

                    void main() {
                        // liquid flow: multiple layers of sine/cosine + noise, influenced by mouse
                        vec2 uv = vUv * 3.0 - 1.5; // expand and center
                        
                        // mouse influence: create a subtle swirl
                        vec2 mouseOffset = (mouse - 0.5) * 2.0; // range -1..1
                        
                        // time scales
                        float t1 = time * 0.4;
                        float t2 = time * 0.7;
                        float t3 = time * 1.2;
                        
                        // distorted coordinates
                        vec2 q = uv;
                        q.x += sin(uv.y * 2.0 + t1) * 0.3 + mouseOffset.x * 0.5;
                        q.y += cos(uv.x * 2.0 + t2) * 0.3 + mouseOffset.y * 0.5;
                        
                        // three layers of liquid noise
                        float c1 = sin(q.x * 4.0 + t1) * cos(q.y * 5.0 - t2);
                        float c2 = sin(q.x * 7.0 + t2 * 1.3) * sin(q.y * 8.0 + t3 * 0.7);
                        float c3 = noise(vec2(q.x * 5.0 + time * 0.5, q.y * 5.0 - time * 0.3)) * 2.0 - 1.0;
                        
                        // combine with interesting weights
                        float r = sin(c1 * 2.0 + c2 * 1.5 + c3 + time * 0.5) * 0.8 + 0.5;
                        float g = cos(c2 * 2.2 + c1 * 1.8 - time * 0.4) * 0.8 + 0.5;
                        float b = sin((c1 + c2 + c3) * 2.5 + time * 0.9) * 0.8 + 0.5;
                        
                        // add extra chromatic swirl based on mouse
                        r += mouse.x * 0.15;
                        g += mouse.y * 0.15;
                        b += (mouse.x + mouse.y) * 0.1;
                        
                        // keep colors vibrant but blend smoothly
                        vec3 color = vec3(r, g, b);
                        
                        // slight vignette for depth
                        float dist = length(vUv - 0.5);
                        color *= 1.0 - dist * 0.6;
                        
                        // subtle blue/green bias to feel like liquid
                        color = mix(color, color.gbr, 0.2);
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `,
                side: THREE.DoubleSide, // visible from both sides (though camera sees front)
                depthWrite: true,
                depthTest: true
            });

            const backgroundPlane = new THREE.Mesh(planeGeo, planeMat);
            backgroundPlane.position.set(0, 0, -30); // far behind icons (icons at ~ -10 .. +10)
            scene.add(backgroundPlane);

            // --- generate simple icon textures (canvas based, no text) ---
            function createIconTexture(shape, hue) {
                const size = 64;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);

                // center and scale
                const cx = size/2;
                const cy = size/2;
                const maxRad = size * 0.4;

                // fill style: gradient with some depth
                const grad = ctx.createRadialGradient(cx-5, cy-5, 5, cx, cy, maxRad*1.2);
                grad.addColorStop(0, `hsl(${hue}, 90%, 75%)`);
                grad.addColorStop(0.7, `hsl(${hue}, 90%, 55%)`);
                grad.addColorStop(1, `hsl(${hue}, 90%, 40%)`);
                
                ctx.fillStyle = grad;
                ctx.strokeStyle = `hsl(${hue}, 90%, 85%)`;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = 'rgba(255,255,255,0.5)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // draw shape
                ctx.beginPath();
                switch(shape) {
                    case 'star':
                        // 5-point star
                        let points = 5;
                        let outerR = maxRad;
                        let innerR = maxRad * 0.45;
                        for (let i = 0; i < points * 2; i++) {
                            let radius = i % 2 === 0 ? outerR : innerR;
                            let angle = (Math.PI / points) * i - Math.PI / 2;
                            let x = cx + radius * Math.cos(angle);
                            let y = cy + radius * Math.sin(angle);
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        break;
                    case 'heart':
                        // simple heart using arcs and triangle approximation (looks iconic)
                        ctx.moveTo(cx, cy - maxRad*0.5);
                        ctx.bezierCurveTo(cx - maxRad*0.8, cy - maxRad*0.8, cx - maxRad*0.3, cy + maxRad*0.3, cx, cy + maxRad*0.7);
                        ctx.bezierCurveTo(cx + maxRad*0.3, cy + maxRad*0.3, cx + maxRad*0.8, cy - maxRad*0.8, cx, cy - maxRad*0.5);
                        break;
                    case 'circle':
                        ctx.arc(cx, cy, maxRad, 0, Math.PI*2);
                        break;
                    case 'square':
                        ctx.rect(cx-maxRad, cy-maxRad, maxRad*2, maxRad*2);
                        break;
                    case 'triangle':
                        ctx.moveTo(cx, cy - maxRad);
                        ctx.lineTo(cx + maxRad*0.9, cy + maxRad*0.6);
                        ctx.lineTo(cx - maxRad*0.9, cy + maxRad*0.6);
                        ctx.closePath();
                        break;
                    case 'diamond':
                        ctx.moveTo(cx, cy - maxRad);
                        ctx.lineTo(cx + maxRad, cy);
                        ctx.lineTo(cx, cy + maxRad);
                        ctx.lineTo(cx - maxRad, cy);
                        ctx.closePath();
                        break;
                    case 'plus':
                        // plus sign as two rectangles
                        ctx.rect(cx - maxRad*0.3, cy - maxRad, maxRad*0.6, maxRad*2);
                        ctx.rect(cx - maxRad, cy - maxRad*0.3, maxRad*2, maxRad*0.6);
                        break;
                    default: // fallback circle
                        ctx.arc(cx, cy, maxRad, 0, Math.PI*2);
                }
                
                ctx.fill();
                ctx.stroke();

                // tiny sparkle effect (optional)
                ctx.shadowBlur = 0; // reset for small dots
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(cx-5, cy-8, 3, 0, 2*Math.PI);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();

                return new THREE.CanvasTexture(canvas);
            }

            // shape types and random hue
            const shapeTypes = ['star', 'heart', 'circle', 'square', 'triangle', 'diamond', 'plus'];
            const iconTextures = shapeTypes.map((shape, idx) => createIconTexture(shape, (idx * 51) % 360)); // varied hues

            // --- create floating icons (sprites) with smooth motion ---
            const iconGroup = new THREE.Group();
            const iconCount = 90; // plenty of floating icons
            const iconData = []; // store per-icon animation parameters

            for (let i = 0; i < iconCount; i++) {
                // pick random texture
                const tex = iconTextures[Math.floor(Math.random() * iconTextures.length)];
                const material = new THREE.SpriteMaterial({ 
                    map: tex, 
                    blending: THREE.NormalBlending,
                    depthTest: true,
                    depthWrite: false,
                    transparent: true,
                    opacity: 0.85 + Math.random() * 0.15
                });
                
                const sprite = new THREE.Sprite(material);
                
                // random base position (cubic volume)
                const baseX = (Math.random() - 0.5) * 20; // -10..10
                const baseY = (Math.random() - 0.5) * 16; // -8..8
                const baseZ = (Math.random() - 0.5) * 12; // -6..6
                
                sprite.position.set(baseX, baseY, baseZ);
                
                // random scale
                const scale = 0.5 + Math.random() * 0.8;
                sprite.scale.set(scale, scale, 1);
                
                // store animation parameters for ultra-smooth floating
                iconData.push({
                    basePos: new THREE.Vector3(baseX, baseY, baseZ),
                    speed: new THREE.Vector3(
                        0.2 + Math.random() * 0.3,
                        0.3 + Math.random() * 0.4,
                        0.15 + Math.random() * 0.25
                    ),
                    phase: new THREE.Vector3(
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2
                    ),
                    amp: new THREE.Vector3(
                        0.7 + Math.random() * 1.2,
                        0.8 + Math.random() * 1.4,
                        0.5 + Math.random() * 1.0
                    ),
                    rotationSpeed: 0.01 + Math.random() * 0.03
                });
                
                iconGroup.add(sprite);
            }
            scene.add(iconGroup);

            // --- extra ambient light not necessary for sprites, but just in case ---
            // (sprites are self-illuminated by texture)

            // --- animation loop ---
            let clock = new THREE.Clock();

            function animate() {
                const delta = clock.getDelta();
                const elapsedTime = performance.now() / 1000; // seconds

                // update background shader time & mouse
                if (backgroundPlane.material.uniforms) {
                    backgroundPlane.material.uniforms.time.value = elapsedTime * 0.8;
                    backgroundPlane.material.uniforms.mouse.value.set(mouse.x, mouse.y);
                }

                // animate icons: smooth 3D undulation
                iconGroup.children.forEach((sprite, idx) => {
                    const data = iconData[idx];
                    if (!data) return;

                    // realistic fluid motion using sin with different speeds/phases per axis
                    const t = elapsedTime;
                    const dx = Math.sin(t * data.speed.x + data.phase.x) * data.amp.x;
                    const dy = Math.cos(t * data.speed.y + data.phase.y) * data.amp.y; // cos for variety
                    const dz = Math.sin(t * data.speed.z + data.phase.z) * data.amp.z;
                    
                    sprite.position.x = data.basePos.x + dx;
                    sprite.position.y = data.basePos.y + dy;
                    sprite.position.z = data.basePos.z + dz;

                    // very subtle rotation around Z (though sprite faces camera, it adds tiny motion perception)
                    // sprite.material.rotation += 0.001; // disabled to keep crisp, but could add
                });

                // slight camera movement for extra dynamics (barely there, like a float)
                // camera.position.x = Math.sin(elapsedTime * 0.1) * 1.2;
                // camera.position.y = Math.cos(elapsedTime * 0.15) * 0.8;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }

            animate();

            // --- resize handler ---
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (backgroundPlane.material.uniforms.resolution) {
                    backgroundPlane.material.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
                }
            }

            // small uniform initializer
            onWindowResize();

            // hide any potential scrollbars (just in case)
            document.body.style.overflow = 'hidden';
        })();
    </script>
</body>
</html>
